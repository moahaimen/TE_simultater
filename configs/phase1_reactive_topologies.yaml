    expected_num_edges: 192

  - key: cernet_real
    dataset_key: cernet
    display_name: "CERNET (41 nodes, 59 bidirectional links)"
    source: topologyzoo  # actual source: TopologyZoo Cernet.graphml
    topology_file: data/topologyzoo/Cernet.graphml
    processed_file: cernet.npz
    traffic_mode: real_sndlib  # NOTE: actual traffic in NPZ is synthetic MGM, not real SNDlib
    expected_num_nodes: 41
    expected_num_edges: 116  # 59 undirected links x 2 = 116 directed edges
