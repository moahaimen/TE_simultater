experiment:
  data_dir: data
  workspace_root: .
  max_steps: 500
  k_paths: 3
  k_crit: 40
  lp_time_limit_sec: 20
  full_mcf_time_limit_sec: 90
  scale_probe_steps: 200
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  regimes:
    C2: 1.3
    C3: 1.8

mgm:
  steps: 500
  seed: 42
  base_scale: 120.0
  diurnal_period: 96
  weekly_period: 672
  modulation_strength: 0.25
  noise_std: 0.08
  hotspot_frac: 0.10

topologies:
  - key: abilene
    source: sndlib
    topology_file: data/raw/topology/abilene.txt
    tm_mode: real_tm
    max_steps: 500
    topology_id: SNDLIB_ABILENE
    display_name: "Abilene Backbone (SNDlib)"

  - key: geant
    source: sndlib
    topology_file: data/raw/topology/geant.txt
    tm_mode: real_tm
    max_steps: 500
    topology_id: SNDLIB_GEANT
    display_name: "GEANT Core (SNDlib)"

  - key: germany50
    source: sndlib
    topology_file: data/raw/topology/germany50.txt
    tm_mode: real_tm
    max_steps: 500
    topology_id: SNDLIB_GERMANY50
    display_name: "Germany50 DFN Aggregated (SNDlib)"

  # Rocketfuel-like local edge-list topology (TM generated via MGM).
  - key: rocketfuel_sample
    source: rocketfuel
    topology_file: data/samples/rocketfuel_sample.txt
    tm_mode: mgm
    max_steps: 500
    topology_id: ROCKETFUEL_R1R6_EDGELIST_V1
    display_name: "Rocketfuel-like R1-R6 EdgeList v1"

  # TopologyZoo-like local GraphML topology (TM generated via MGM).
  - key: topozoo_sample
    source: topologyzoo
    topology_file: data/samples/topologyzoo_sample.graphml
    tm_mode: mgm
    max_steps: 500
    topology_id: TOPOLOGYZOO_Z1Z8_GRAPHML_V1
    display_name: "TopologyZoo-like Z1-Z8 GraphML v1"
